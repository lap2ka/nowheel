modLoader = "javafml"
loaderVersion = "${loader_version_range}"
issueTrackerURL = "https://github.com/lap2ka/nowheel/issues"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
displayURL = "https://modrinth.com/mod/create-nowheel"
authors="Lap2ka"
logoFile="icon.png"
description = '''
Boost performance in Create using Occlusion Culling
'''

[[mixins]]
config = "nowheel.mixins.json"

[[dependencies.${ mod_id }]]
modId = "forge"
mandatory = true
versionRange = "${forge_version_range}"
ordering = "NONE"
side = "CLIENT"

[[dependencies.${ mod_id }]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "CLIENT"

[[dependencies.${ mod_id }]]
modId = "create"
mandatory = true
versionRange = "[6.0.8,)"
ordering = "AFTER"
side = "CLIENT"

[[dependencies.${ mod_id }]]
modId = "entityculling"
mandatory = true
versionRange = "[1.9,)"
ordering = "AFTER"
side = "CLIENT"

[[dependencies.${ mod_id }]]
modId = "cloth_config"
mandatory = false
versionRange = "[11,)"
ordering = "AFTER"
side = "CLIENT"
